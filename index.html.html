<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BIG-POTATO 커스텀 저장형 뽑기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        :root {
            --bg-color: #f7f3e9;
            --bell-yellow: #f9d849;
            --bell-brown: #8b5a2b;
            --potato-color: #d1a054;
            --main-green: #7ba35a;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Gaegu', cursive;
            color: #5d4037;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 10px;
            margin: 0;
            min-width: 1300px;
        }

        h1 { font-size: 3.5rem; margin: 0; color: var(--main-green); text-shadow: 2px 2px 0px #fff; }
        .desc { margin-bottom: 30px; font-size: 1.4rem; color: #8d775f; }

        /* 판 디자인 (가로 20개 고정) */
        #board {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 12px;
            width: fit-content;
            background: rgba(255, 255, 255, 0.4);
            padding: 25px;
            border-radius: 40px;
            border: 5px dotted var(--main-green);
        }

        /* 주머니 디자인 */
        .bell-bag {
            width: 55px; height: 75px;
            position: relative; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 8px; margin: 0 auto;
        }
        .bag-body {
            position: absolute; bottom: 0; width: 55px; height: 55px;
            background-color: var(--bell-yellow); border-radius: 35% 35% 45% 45%;
            box-shadow: 0 4px 0px #c5a028; border: 1.5px solid #b29120;
        }
        .bag-top {
            position: absolute; top: 5px; width: 35px; height: 20px;
            background-color: var(--bell-yellow); border-radius: 50% 50% 0 0;
            border: 1.5px solid #b29120; border-bottom: none; z-index: 1;
        }
        .bag-tie {
            position: absolute; top: 22px; width: 45px; height: 7px;
            background-color: var(--bell-brown); border-radius: 10px; z-index: 2;
        }
        .potato-mark {
            position: absolute; bottom: 15px; width: 32px; height: 26px;
            background: var(--potato-color); border-radius: 40% 50% 45% 40%;
            z-index: 3; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .eye { width: 2px; height: 2px; background: #5d4037; border-radius: 50%; margin: 0 2px; }
        .bag-num { font-size: 15px; font-weight: bold; color: #fff; text-shadow: 1px 1px 0px #8b5a2b; z-index: 4; margin-top: 4px; }
        
        .bell-bag:hover { transform: translateY(-7px) scale(1.1); }
        .bell-bag.opened { filter: sepia(0.4) grayscale(0.8); opacity: 0.4; cursor: default; transform: scale(0.9); }

        /* 설정창 */
        .settings {
            margin-top: 50px; background: white; padding: 30px; border-radius: 40px;
            width: 500px; box-shadow: 0 10px 0px #dcd7c9;
        }
        .setting-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .reward-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .reward-name { flex: 3; padding: 8px; border: 2px solid #eee; border-radius: 10px; font-family: 'Gaegu'; font-size: 1.1rem; }
        .reward-count { flex: 1; padding: 8px; border: 2px solid #eee; border-radius: 10px; font-family: 'Gaegu'; font-size: 1.1rem; text-align: center; }
        
        .btn-action { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .btn-add { background: var(--main-green); }
        .btn-remove { background: #ff6b6b; }
        .btn-refresh { 
            width: 100%; margin-top: 25px; background: #ff8a65; color: white; border: none;
            padding: 15px; border-radius: 20px; font-size: 1.6rem; font-family: 'Gaegu'; cursor: pointer;
            box-shadow: 0 6px 0px #d84315;
        }

        /* 모달 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        #modal {
            background: #fffdf0; width: 340px; padding: 40px; border-radius: 50px;
            border: 10px solid var(--main-green); text-align: center; transform: scale(0.5); transition: transform 0.3s;
        }
        #modal.show { transform: scale(1); }
        .result-text { font-size: 2rem; margin: 25px 0; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🥔 BIG-POTATO 랜덤 번호 뽑기판 🍃</h1>
    <p class="desc">주머니 번호가 랜덤하게 섞여있습니다! 보상은 자동 저장됩니다.</p>

    <div id="board"></div>

    <div class="settings">
        <div class="setting-header">
            <span style="font-weight: bold;">전체 주머니 개수:</span>
            <input type="number" id="totalBagCount" value="60" onchange="saveData()">
        </div>
        
        <div id="rewardList"></div>
        <button class="btn-action btn-add" style="width: 100%; border-radius: 10px; margin-top: 10px;" onclick="addRow()">+ 보상 항목 추가</button>
        
        <button class="btn-refresh" onclick="initGame()">✨ 번호 섞어서 새 판 만들기 ✨</button>
    </div>

    <div id="modal-overlay">
        <div id="modal">
            <h2 style="color: var(--main-green);">✨ 당첨! ✨</h2>
            <div class="result-text" id="result-display">-</div>
            <button onclick="closeModal()" style="background:var(--main-green); color:white; border:none; padding:10px 30px; border-radius:20px; font-family:'Gaegu'; cursor:pointer;">가방에 넣기</button>
        </div>
    </div>

    <script>
        let resultData = [];

        // 로컬 스토리지 저장 기능
        function saveData() {
            const data = {
                total: document.getElementById('totalBagCount').value,
                rewards: []
            };
            document.querySelectorAll('.reward-row').forEach(row => {
                data.rewards.push({
                    name: row.querySelector('.reward-name').value,
                    count: row.querySelector('.reward-count').value
                });
            });
            localStorage.setItem('bigPotatoData', JSON.stringify(data));
        }

        // 데이터 불러오기
        function loadData() {
            const saved = localStorage.getItem('bigPotatoData');
            const list = document.getElementById('rewardList');
            list.innerHTML = '';
            
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('totalBagCount').value = data.total;
                data.rewards.forEach(r => addRow(r.name, r.count));
            } else {
                // 기본값
                const defaults = [
                    {n: "🥇 황금 감자", c: 1}, {n: "🥈 찐 감자", c: 3}, {n: "🥉 감자 튀김", c: 6},
                    {n: "🍀 감자 씨앗", c: 10}, {n: "🥔 그냥 흙", c: 40}
                ];
                defaults.forEach(d => addRow(d.n, d.c));
            }
        }

        function addRow(name = "", count = 1) {
            const list = document.getElementById('rewardList');
            const div = document.createElement('div');
            div.className = 'reward-row';
            div.innerHTML = `
                <input type="text" class="reward-name" value="${name}" placeholder="보상 이름" oninput="saveData()">
                <input type="number" class="reward-count" value="${count}" oninput="saveData()">
                <button class="btn-action btn-remove" onclick="removeRow(this)">-</button>
            `;
            list.appendChild(div);
            saveData();
        }

        function removeRow(btn) {
            btn.parentElement.remove();
            saveData();
        }

        function initGame() {
            const board = document.getElementById('board');
            const total = parseInt(document.getElementById('totalBagCount').value) || 20;
            board.innerHTML = '';
            
            // 1. 보상 데이터 섞기
            let tempRewards = [];
            document.querySelectorAll('.reward-row').forEach(row => {
                const name = row.querySelector('.reward-name').value || "보상 없음";
                const count = parseInt(row.querySelector('.reward-count').value) || 0;
                for(let i=0; i<count; i++) tempRewards.push(name);
            });

            while(tempRewards.length < total) tempRewards.push("💨 꽝! 다음 기회에");
            tempRewards = tempRewards.slice(0, total).sort(() => Math.random() - 0.5);

            // 2. 번호(1~N) 섞기
            let numbers = Array.from({length: total}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

            // 3. 판 생성
            resultData = [];
            for (let i = 0; i < total; i++) {
                const num = numbers[i];
                const reward = tempRewards[i];
                resultData[num] = reward; // 번호를 인덱스로 보상 저장

                const bag = document.createElement('div');
                bag.className = 'bell-bag';
                bag.innerHTML = `
                    <div class="bag-top"></div><div class="bag-tie"></div><div class="bag-body"></div>
                    <div class="potato-mark">
                        <div style="display:flex;"><div class="eye"></div><div class="eye"></div></div>
                        <div class="bag-num">${num}</div>
                    </div>
                `;
                bag.onclick = () => openBag(bag, num);
                board.appendChild(bag);
            }
        }

        function openBag(element, num) {
            if (element.classList.contains('opened')) return;
            element.classList.add('opened');
            showModal(resultData[num]);
        }

        function showModal(text) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            document.getElementById('result-display').innerText = text;
            overlay.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
        }

        loadData();
        initGame();
    </script>
</body>

</html>
